<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HOLOGRAMA">
  <!-- Favicon fallback of the Prism Aperture mark. Below ~24px the six
       facet hairlines are the first detail to wash out (same failure mode
       as the Portal Ring's token at small size), so this variant drops
       them and keeps the outer hexagon silhouette filled with the full
       three-hue gradient — silhouette + identity color carry the mark at
       16px, structural facet lines do not. Mirrors the sibling system's
       rule: keep the core shape, drop the secondary detail, never the
       reverse. Dark-only: only ever place on the bg canvas token or darker. -->
  <defs>
    <linearGradient id="holoFacet" gradientUnits="userSpaceOnUse" x1="12.95" y1="10" x2="51.05" y2="54">
      <stop offset="0%"   stop-color="#D63BD6"/>
      <stop offset="35%"  stop-color="#FFC100"/>
      <stop offset="70%"  stop-color="#00C1E5"/>
      <stop offset="100%" stop-color="#D63BD6"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="#0E0814"/>
  <polygon points="32,10 51.05,21 51.05,43 32,54 12.95,43 12.95,21" fill="url(#holoFacet)"/>
</svg>
